{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0"><i class="fas fa-check-circle me-2"></i>Password Changed</h3>
            </div>
            <div class="card-body">
                <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
                <div class="text-center">
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
